# Intent classification rules — ordered by priority (first match wins).
# Used by QueryProcessor to route queries to the right agent.

intent_patterns:
  statistical:
    priority: CRITICAL
    description: Questions about numbers, trends, counts, history
    patterns:
      - "how many (commits|contributors|committers|stars|forks|releases|files|lines)"
      - "when was (the last|first) (commit|release|update)"
      - "show (me )?(a )?(graph|chart|plot|trend)"
      - "commit (history|frequency|cadence|activity|trend)"
      - "release (cadence|frequency|history)"
      - "most active (contributors?|committers?)"
      - '(top|main|primary|key) (contribut\w+|committ?\w+)'
      - 'who (are the |have been )?(contribut\w+|committ?\w+)'
      - "who (contributed|committed|commited|works on|is working on)"
      - '(list|show) (the )?(contribut\w+|committ?\w+)'
      - 'contribut\w+ (to|for|of)'
      - 'committ?\w+ (to|for|of)'
      - "lines of code"
      - "growth (over time|trend)"
      - "(stars|forks|watchers|issues|releases|contributors|committers)"
      - "activity (over|in|last|this)"
      - "weekly|monthly (commits|activity|contributions)"

  comparison:
    priority: HIGH
    description: Side-by-side comparison of two or more projects
    patterns:
      - "compare (.+) (and|vs|versus|to|with) (.+)"
      - "difference between (.+) and (.+)"
      - "which (project|one|repo) (is|has|does|has more|is more)"
      - "better than|worse than|similar to"
      - "pros and cons"
      - "(more|fewer|less) (stars|forks|commits|contributors|issues|releases) than"
      - "which (has|have|is|are) (more|fewer|less|better|worse|faster|slower)"
      - "statistical(ly)? compar"
      - '(side.by.side|head.to.head)'
      - '\bversus\b'
      - 'vs\.?\s+\w'

  health:
    priority: HIGH
    description: Community activity, maintenance status, contributor health
    patterns:
      - "(is|how).*(actively|well) maintained"
      - "actively maintained"
      - "community health"
      - "bus factor"
      - "contributor diversity"
      - "response time (for )?(issues?|prs?|pull requests?)"
      - "last (active|activity|commit|update)"
      - "abandoned|archived|dead"

  code_search:
    priority: NORMAL
    description: Questions about code, methods, functions, APIs
    patterns:
      - "how (do I|to|can I) (use|call|implement|create|build)"
      - "show (me )?(an? )?(example|sample|code)"
      - "what does (method|function|class|module) .+ do"
      - "how is .+ implemented"
      - "source code for"
      - "api (for|to)"

  conceptual:
    priority: NORMAL
    description: Architecture, concepts, getting started, configuration
    patterns:
      - "what is"
      - "how does .+ work"
      - "explain"
      - "getting started"
      - "architecture"
      - "design"
      - "concepts?"
      - "configuration"
      - "install"
      - "setup"
      - "overview"

  general:
    priority: LOW
    description: Fallback — standard RAG retrieval across all relevant collections
    patterns: []
